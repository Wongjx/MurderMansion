name: Deploy Discovery Worker

on:
  workflow_dispatch:
  push:
    branches:
      - master
    paths:
      - "MurderMansion/murder-mansion-discovery/**"
      - ".github/workflows/deploy-discovery-worker.yml"

concurrency:
  group: discovery-worker-deploy
  cancel-in-progress: true

jobs:
  deploy-and-smoke:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: MurderMansion/murder-mansion-discovery
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: 5c145b0e7988ca0a594a9a8af4ce0b47
      MURDER_MANSION_DISCOVERY_URL: https://murder-mansion-discovery.jxlee92.workers.dev

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Wrangler
        run: npm install -g wrangler@4.77.0

      - name: Deploy Worker And Run Relay Smoke Test
        run: npm run deploy:smoke
