name: Package Desktop Windows

on:
  workflow_dispatch:

jobs:
  package-windows:
    runs-on: windows-latest

    defaults:
      run:
        shell: pwsh
        working-directory: MurderMansion

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v4

      - name: Package Windows executable
        run: .\gradlew.bat -Dorg.gradle.java.home="$env:JAVA_HOME" desktop:packageWindowsExe

      - name: List packaged files
        run: Get-ChildItem -Recurse .\desktop\build\packaging\windows\output

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: murder-mansion-windows
          path: |
            MurderMansion/desktop/build/packaging/windows/output/*.exe
            MurderMansion/desktop/build/packaging/windows/output/*.msi
          if-no-files-found: error
